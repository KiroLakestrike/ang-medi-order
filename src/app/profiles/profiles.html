<div class="container">
  <div class="profile__header">
    <div class="profile__actions">
      <button type="button" class="btn btn-new" (click)="onNewClick()">Neues Profil</button>
      <button type="button" class="btn btn-new">Sortieren</button>
    </div>
  </div>
  <div class="profile-list"></div>
  @for (item of profiles?.profileItem ?? []; track item.email) {
  <app-profile-card [profile]="item"></app-profile-card>
  } @empty {
  <p>Noch keine Profile...</p>
  }
</div>

<div class="modal hide" [class.show]="mode === 'new'">
  <article class="profile-card">
    <div class="profile-card__top">
      <h2 class="profile-card__title">Neues Profil erstellen</h2>
    </div>
    <div class="profile-card__content">
      <form class="form hide" id="new-form" #form="ngForm" (ngSubmit)="onSaveClick(form)">
        <div class="form__row">
          <label class="form__group">
            <span class="form__label">Vorname</span>
            <input
              class="form__input"
              type="text"
              placeholder="Max"
              name="firstName"
              [(ngModel)]="newProfile.firstName"
            />
          </label>

          <label class="form__group">
            <span class="form__label">Nachname</span>
            <input
              class="form__input"
              type="text"
              placeholder="Mustermann"
              name="lastName"
              [(ngModel)]="newProfile.lastName"
            />
          </label>

          <label class="form__group">
            <span class="form__label">Geburtsdatum</span>
            <input
              class="form__input"
              type="date"
              placeholder="26.11.1990"
              name="dateOfBirth"
              [(ngModel)]="newProfile.dateOfBirth"
            />
          </label>
        </div>

        <hr />

        <div class="form__row">
          <label class="form__group">
            <span class="form__label">Email</span>
            <input
              class="form__input"
              type="text"
              placeholder="beispiel@test.de"
              name="email"
              [(ngModel)]="newProfile.email"
            />
          </label>

          <label class="form__group">
            <span class="form__label">Telefonnummer</span>
            <input
              class="form__input"
              type="text"
              placeholder="0176 585 885 25"
              name="phone"
              [(ngModel)]="newProfile.phone"
            />
          </label>
        </div>
        <div class="form__row">
          <label class="form__group">
            <span class="form__label">Versichertennummer</span>
            <input
              class="form__input"
              type="text"
              placeholder="X123456789"
              name="insuranceNumber"
              [(ngModel)]="newProfile.insuranceNumber"
            />
          </label>

          <label class="form__group">
            <span class="form__label">Krankenkasse</span>
            <input
              class="form__input"
              type="text"
              name="insuranceName"
              [(ngModel)]="newProfile.insuranceName"
              placeholder="AOK Niedersachsen"
            />
          </label>
        </div>
        <hr />
        <div class="form__row">
          <label class="form__group">
            <span class="form__label">Einrichtung</span>
            <input
              class="form__input"
              type="text"
              name="company"
              [(ngModel)]="newProfile.company"
              placeholder="Haus der Sonne"
            />
          </label>

          <label class="form__group">
            <span class="form__label">Strasse & Nummer</span>
            <input
              class="form__input"
              type="text"
              name="address"
              [(ngModel)]="newProfile.address"
              placeholder="Musterstrasse 22"
            />
          </label>

          <label class="form__group">
            <span class="form__label">PLZ</span>
            <input
              class="form__input"
              type="text"
              name="zip"
              [(ngModel)]="newProfile.zip"
              placeholder="12345"
            />
          </label>

          <label class="form__group">
            <span class="form__label">Ort</span>
            <input
              class="form__input"
              type="text"
              name="place"
              [(ngModel)]="newProfile.place"
              placeholder="Musterstadt"
            />
          </label>
        </div>
        <label class="form__group">
          <span class="form__label">Beschreibung</span>
          <textarea
            class="form__input"
            name="description"
            [(ngModel)]="newProfile.description"
            placeholder="Zimmer 202"
          ></textarea>
        </label>

        <div class="profile-card__actions">
          <button type="submit" class="btn btn-edit">Speichern</button>
          <button type="button" class="btn btn-delete" (click)="onCancelClick(form)">
            Abbrechen
          </button>
        </div>
      </form>
    </div>
  </article>
</div>
